<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0d0d0d;
  font-family: Georgia, 'Times New Roman', serif;
  position: relative;
}

/* Car image - right side, dark graded */
.car-bg {
  position: absolute;
  right: 0; top: 0;
  width: 660px;
  height: 630px;
  background: url('images/concierge.jpg') center/cover no-repeat;
  filter: brightness(0.45) saturate(0.4) contrast(1.1);
}

/* Gradient fade left over car */
.car-fade {
  position: absolute;
  right: 0; top: 0;
  width: 660px;
  height: 630px;
  background: linear-gradient(to right, #0d0d0d 0%, #0d0d0d 10%, transparent 55%);
}

/* Gold top border */
.top-line {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, #c9a84c, #f0c96a, #c9a84c);
}

/* Left content */
.content {
  position: absolute;
  left: 72px;
  top: 50%;
  transform: translateY(-50%);
  width: 540px;
}

.label {
  font-family: 'Arial', sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: #c9a84c;
  text-transform: uppercase;
  margin-bottom: 22px;
  opacity: 0.8;
}

.title-main {
  font-size: 64px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.05;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.title-gold {
  font-size: 64px;
  font-weight: 700;
  color: #c9a84c;
  line-height: 1.05;
  letter-spacing: 2px;
  margin-bottom: 28px;
}

.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(to right, #c9a84c, #f0c96a);
  margin-bottom: 24px;
}

.tagline {
  font-family: 'Arial', sans-serif;
  font-size: 16px;
  color: #e8d5a3;
  line-height: 1.7;
  opacity: 0.75;
  max-width: 420px;
  margin-bottom: 40px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #c9a84c55;
  padding: 10px 20px;
  background: rgba(201,168,76,0.07);
}

.badge-dot {
  width: 6px;
  height: 6px;
  background: #c9a84c;
  border-radius: 50%;
}

.badge-text {
  font-family: 'Arial', sans-serif;
  font-size: 12px;
  letter-spacing: 3px;
  color: #c9a84c;
  text-transform: uppercase;
}

/* Logo top-left */
.logo {
  position: absolute;
  top: 36px;
  left: 72px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-a {
  font-family: Georgia, serif;
  font-size: 28px;
  font-weight: 700;
  color: #c9a84c;
  border: 1.5px solid #c9a84c55;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-text {
  font-family: 'Arial', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: #c9a84c99;
  text-transform: uppercase;
  line-height: 1.6;
}

/* Bottom line */
.bottom-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, #c9a84c55, transparent);
}

/* URL watermark */
.url {
  position: absolute;
  bottom: 28px;
  left: 72px;
  font-family: 'Arial', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: #c9a84c44;
  text-transform: uppercase;
}
</style>
</head>
<body>
  <div class="car-bg"></div>
  <div class="car-fade"></div>
  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="logo">
    <div class="logo-a">A</div>
    <div class="logo-text">ALEX<br>LUXURY</div>
  </div>

  <div class="content">
    <div class="label">Brooklyn, New York</div>
    <div class="title-main">PREMIUM</div>
    <div class="title-gold">CAR DEALERSHIP</div>
    <div class="divider"></div>
    <div class="tagline">We source, negotiate, and deliver luxury vehicles with white glove service.</div>
    <div class="badge">
      <div class="badge-dot"></div>
      <div class="badge-text">alexluxury.vercel.app</div>
    </div>
  </div>

  <div class="url">alexluxury.vercel.app</div>
</body>
</html>
