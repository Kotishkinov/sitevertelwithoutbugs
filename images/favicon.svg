<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c96a"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#9a7a2e"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0d0d0d" rx="8"/>
  <!-- Thin gold border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="url(#gold)" stroke-width="1.5" rx="6.5" opacity="0.6"/>
  <!-- Letter A -->
  <text x="32" y="44" font-family="Georgia, serif" font-size="38" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">A</text>
  <!-- Thin underline accent -->
  <rect x="16" y="50" width="32" height="1.5" fill="url(#gold)" opacity="0.5"/>
</svg>
